# Production: place Prometheus on the same private Docker network as the API.
# Do not publish the API container port or /metrics through Caddy.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: unibridge-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
